function pickMoves(d){
  var pool=[];
  if(d.oa<55)pool.push('ops_low');if(d.dt<55)pool.push('data_low');
  if(d.air<55)pool.push('ai_low');if(d.cg<55)pool.push('cust_low');
  if(d.oa<70)pool.push('ops_mid');if(d.dt<70)pool.push('data_mid');
  if(d.air<70)pool.push('ai_mid');if(d.cg<70)pool.push('cust_mid');
  if(d.score>=65)pool.push('poc');if(d.score>=75)pool.push('gov');
  var seen={},chosen=[];
  pool.forEach(function(k){if(!seen[k]&&chosen.length<3){seen[k]=true;chosen.push(k);}});
  MOVES.forEach(function(m){if(chosen.length<3&&!seen[m.k]){chosen.push(m.k);seen[m.k]=true;}});
  return chosen.slice(0,3).map(function(k){return MOVES.filter(function(m){return m.k===k;})[0];});
}

  var tierBg,tierColor,tierLabel;

  else if(d.tier==='Emerging'){tierBg='#E6F1FB';tierColor='#185FA5';tierLabel='📈 Emerging';}
  else if(d.tier==='Building'){tierBg='#FAEEDA';tierColor='#854F0B';tierLabel='🌱 Building';}
  else{tierBg='#FAECE7';tierColor='#993C1D';tierLabel='🔍 Exploring';}

  var bc=dims.map(function(dim){
    return '<div class="bc"><div class="bc-name">'+dim.name+'</div>'
      +'<div class="bc-bg"><div class="bc-fill" style="width:'+dim.score+'%;background:'+sc(dim.score)+'"></div></div>'
      +'<div class="bc-score">'+dim.score+'/100</div></div>';
  }).join('');

  var sm=STRENGTH[strongest.name]||{title:'Your foundation',body:'You have strengths to build from.'};
  var fm=FOCUS[oppName]||FOCUS[weakest.name]||{title:'Your focus area',body:'Improvement here will have the most impact.'};
  var moves=pickMoves(d);
  var tagLabels={quick:'Quick win',medium:'This month',strategic:'Strategic move'};
  var moveHtml=moves.map(function(m,i){
    return '<div class="move-card"><div class="move-num">'+(i+1)+'</div><div>'
      +'<div class="move-title">'+m.title+'</div><div class="move-body">'+m.body+'</div>'
      +'<span class="move-tag '+m.tag+'">'+tagLabels[m.tag]+'</span></div></div>';
  }).join('');

  // One free ungated tip based on lowest-scoring dimension
  var FREE_TIPS={
    'Business Foundations':'Start by writing down every task your team does more than once a week. Just a list — no solutions yet. That inventory is the foundation of every AI and automation decision you\'ll make. Most businesses that do this exercise find at least one task they can eliminate or automate in under a day.',
    'Data & Technology':'Pick your single most important customer dataset — even if it\'s just a spreadsheet — and spend 30 minutes asking: Is every row complete? Are the fields consistent? Is it in one place? A quick data audit almost always reveals the specific gap that\'s quietly limiting what AI can do for your business.',
    'Operations & Automation':'Time one task this week. Pick the most repetitive thing your team does — responding to a standard inquiry, generating a report, updating a record — and measure how long it actually takes. That number is your baseline. Businesses that track this before automating consistently get better results than those that don\'t.',
    'Customer & Growth':'Send one question to your last 10 customers this week: "What\'s one thing we could have made easier for you?" That\'s it. The responses will tell you more about where AI can help your customer experience than any internal discussion. One question, sent today, is worth more than a strategy session next month.',
    'AI Readiness':'Before you pick any AI tool, write down one sentence: "We\'ll know AI is working when ___." Fill in a specific, measurable outcome. Time saved, leads generated, support tickets reduced — anything concrete. Businesses with a clear success definition get there faster and waste far less money along the way.'
  };
  var freeTip=FREE_TIPS[oppName]||FREE_TIPS[weakest.name];

  // Blurred teaser content (what's locked)
  var lockedHTML='<div class="section-wrap" style="margin-top:0;">'
    +'<div class="opp-card"><span class="opp-icon">⚡</span><div>'
    +'<div class="opp-eyebrow">Biggest Opportunity</div>'
    +'<div class="opp-title">'+oppName+'</div>'
    +'<div class="opp-body">'+(OPP[oppName]||OPP[weakest.name])+'</div>'
    +'</div></div></div>'
    +'<div class="section-wrap"><div class="section-lbl">What this means for you</div>'
    +'<div class="meaning-grid">'
    +'<div class="mc strength"><div class="mc-lbl strength">Where you\'re strong</div><div class="mc-title">'+sm.title+'</div><div class="mc-body">'+sm.body+'</div></div>'
    +'<div class="mc focus"><div class="mc-lbl focus">Where to focus</div><div class="mc-title">'+fm.title+'</div><div class="mc-body">'+fm.body+'</div></div>'
    +'</div></div>'
    +'<div class="section-wrap"><div class="section-lbl">Your next three moves</div>'+moveHtml+'</div>';

  document.getElementById('app').innerHTML=
    // HERO — score + tier always visible
    '<div class="hero-card">'
    +'<div class="hero-eyebrow">Your AI Readiness Report</div>'
    +'<div class="hero-score">'+d.score+'</div>'
    +'<div class="hero-score-label">out of 100</div>'
    +'<span class="tier-badge" style="background:'+tierBg+';color:'+tierColor+'">'+tierLabel+'</span>'
    +'<div class="hero-desc">'+(NARRATIVES[d.tier]||NARRATIVES['Exploring'])+'</div>'
    +'</div>'

    // SCORE BREAKDOWN — always visible
    +'<div class="section-wrap"><div class="section-lbl">Score Breakdown</div>'
    +'<div class="breakdown-bar">'+bc+'</div></div>'

    // FREE TIP — ungated, based on lowest dimension
    +'<div class="section-wrap">'
    +'<div style="background:var(--white);border:1px solid var(--border);border-left:4px solid var(--teal);border-radius:var(--radius);padding:1.5rem 1.75rem;">'
    +'<div style="font-size:10px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;">💡 One thing you can do today</div>'
    +'<div style="font-size:14px;color:var(--text-dark);line-height:1.7;">'+freeTip+'</div>'
    +'</div></div>'

    // LOCKED SECTION — blurred with capture overlay, OR fully open if skipGate=true
    +(skipGate
      ? '<div class="section-wrap" id="locked-section">'+lockedHTML+'</div>'
      : '<div class="locked-section" id="locked-section">'
        +'<div class="locked-content" id="locked-content">'+lockedHTML+'</div>'
        +'<div class="lock-overlay" id="lock-overlay">'
        +'<div class="lock-card">'
        +'<div class="lock-icon">🔓</div>'
        +'<div class="lock-title">You\'ve done the hard part.<br>Now get the full picture.</div>'
        +'<div class="lock-sub">Enter your details to unlock your personalized action plan, biggest opportunity, and three specific next moves for your business.</div>'
        +'<ul class="lock-unlocks">'
        +'<li><span class="lock-check">✓</span><span><strong>Your personalized action plan</strong> — the 3 highest-impact AI moves for your specific business</span></li>'
        +'<li><span class="lock-check">✓</span><span><strong>Your biggest opportunity area</strong> — where focused effort will move the needle fastest</span></li>'
        +'<li><span class="lock-check">✓</span><span><strong>Where you\'re strong & where to focus</strong> — what your scores actually mean in practice</span></li>'
        +'<li><span class="lock-check">✓</span><span><strong>A free 30-minute consultation</strong> with an elevatemy.ai specialist</span></li>'
        +'</ul>'
        +'<div class="lock-fields">'
        +'<input class="lock-input" type="text" id="cap-name" placeholder="Your first name" autocomplete="given-name"/>'
        +'<input class="lock-input" type="email" id="cap-email" placeholder="Work email address" autocomplete="email"/>'
        +'<input class="lock-input" type="text" id="cap-company" placeholder="Company name" autocomplete="organization"/>'
        +'<input class="lock-input" type="tel" id="cap-phone" placeholder="Phone number (optional)" autocomplete="tel"/>'
        +'</div>'
        +'<button class="lock-btn" onclick="unlock()">Unlock my full report →</button>'
        +'<div class="lock-error" id="cap-error">Please enter your name, a valid email, and company name.</div>'
        +'<div class="lock-privacy">No spam. Your details are kept confidential and never shared.</div>'
        +'</div></div></div>'
    )

    // Consult strip and CTAs — always show when coming from email
    +(skipGate
      ? '<div class="consult-strip">'
        +'<div><div class="consult-eyebrow">🎯 Included with your report</div>'
        +'<div class="consult-title">Book your free 30-minute AI strategy consultation</div>'
        +'<div class="consult-sub">Sit down (virtually) with an elevatemy.ai specialist to walk through your results and map out your first AI implementation steps — no obligation, no sales pitch.</div></div>'
        +'<a class="consult-btn" href="https://meetings.hubspot.com/matt-barnhart/eai-meeting" target="_blank" rel="noopener">Book my free consultation →</a>'
        +'</div>'
        +'<div class="cta-row">'
        +'<a class="btn-primary" href="/general/pricing.html">See recommended plans →</a>'
        +'<a class="btn-secondary" href="/general/assessment.html">Retake assessment</a>'
        +'</div>'
      : ''
    );

  // Store d for use in unlock()
  window._d = d;
}

function unlock(){
  var name=document.getElementById('cap-name').value.trim();
  var email=document.getElementById('cap-email').value.trim();
  var company=document.getElementById('cap-company').value.trim();
  var phone=document.getElementById('cap-phone').value.trim();
  var errEl=document.getElementById('cap-error');
  if(!name||!email||!email.includes('@')||!company){errEl.style.display='block';return;}
  errEl.style.display='none';

  // Remove overlay, unblur content
  var overlay=document.getElementById('lock-overlay');
  var content=document.getElementById('locked-content');
  if(overlay)overlay.remove();
  if(content){content.style.filter='none';content.style.opacity='1';content.style.pointerEvents='auto';content.style.userSelect='auto';}

  // Add consult strip and CTA after unlocked content
  var app=document.getElementById('app');
  var consultDiv=document.createElement('div');
  consultDiv.innerHTML='<div class="consult-strip">'
    +'<div><div class="consult-eyebrow">🎯 Included with your report</div>'
    +'<div class="consult-title">Book your free 30-minute AI strategy consultation</div>'
    +'<div class="consult-sub">Sit down (virtually) with an elevatemy.ai specialist to walk through your results and map out your first AI implementation steps — no obligation, no sales pitch.</div></div>'
    +'<a class="consult-btn" href="https://meetings.hubspot.com/matt-barnhart/eai-meeting" target="_blank" rel="noopener">Book my free consultation →</a>'
    +'</div>'
    +'<div class="cta-row">'
    +'<a class="btn-primary" href="/general/pricing.html">See recommended plans →</a>'
    +'<a class="btn-secondary" href="/general/assessment.html">Retake assessment</a>'
    +'</div>';
  app.appendChild(consultDiv);

  // Scroll to revealed content
  document.getElementById('locked-section').scrollIntoView({behavior:'smooth',block:'start'});

  // Submit to HubSpot
  submitToHubSpot(name, email, company, phone);
}

function submitToHubSpot(name, email, company, phone){
  var stored=sessionStorage.getItem('eai_answers');
  var answerTexts=[];
  var resultData=window._d;
  if(stored){try{var obj=JSON.parse(stored);answerTexts=obj.a||[];}catch(e){}}

  var nameParts=name.split(' ');
  var firstName=nameParts[0];
  var lastName=nameParts.slice(1).join(' ');
  var d=window._d||{};

  // Build full results URL for email
  var p=[];
  p.push('name='+encodeURIComponent(firstName));
  p.push('score='+(d.score||0));
  p.push('tier='+encodeURIComponent(d.tier||''));
  p.push('bf='+(d.bf||0));p.push('dt='+(d.dt||0));p.push('oa='+(d.oa||0));
  p.push('cg='+(d.cg||0));p.push('air='+(d.air||0));
  p.push('opp='+encodeURIComponent(d.opp||''));
  p.push('q18='+encodeURIComponent(d.q18||''));
  p.push('q19='+encodeURIComponent(d.q19||''));
  var resultsURL='https://23625222.hs-sites.com/elevatemy.ai-result-nfp?'+p.join('&');

  var qNames=['ai_assessment__business_stage','ai_assessment__team_size','ai_assessment__digital_tool_comfort',
    'ai_assessment__most_timeconsuming_area','ai_assessment__customer_contact_management','ai_assessment__business_reporting',
    'ai_assessment__technology_stack','ai_assessment__data_quality_confidence','ai_assessment__manual_work_volume',
    'ai_assessment__automation_tool_experience','ai_assessment__customer_inquiry_handling','ai_assessment__content_creation_frequency',
    'ai_assessment__customer_acquisition_method','ai_assessment__communication_personalization','ai_assessment__marketing_attribution',
    'ai_assessment__customer_feedback_collection','ai_assessment__current_ai_tool_usage','ai_assessment__biggest_ai_adoption_blocker',
    'ai_assessment__most_desired_ai_outcome','ai_assessment__leadership_time_commitment'];

  var fields=[
    {name:'firstname',value:firstName},{name:'lastname',value:lastName},
    {name:'email',value:email},{name:'company',value:company},{name:'phone',value:phone||''},
    {name:'ai_readiness_tier',value:d.tier||''},
    {name:'ai_assessment__biggest_opportunity_area',value:d.opp||''},
    {name:'ai_results_url_general',value:resultsURL},
    {name:'ai_assessment_completion_date_nonfp',value:new Date().toISOString().split('T')[0]}
  ];

  // Add all 20 question answers if we have them
  qNames.forEach(function(qName,i){
    if(answerTexts[i]){fields.push({name:qName,value:answerTexts[i]});}
  });

  fields=fields.filter(function(f){return f.value!=='';});
  console.log('Submitting to HubSpot...',fields.length,'fields');

  fetch(/* TODO: replace with Matt's CRM endpoint once contract is confirmed */ 'https://api.hsforms.com/submissions/v3/integration/submit/'+HS_PORTAL_ID+'/'+HS_FORM_GUID,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fields:fields,context:{pageUri:window.location.href,pageName:'elevatemy.ai General Business Assessment Results'}})
  }).then(function(res){console.log(res.ok?'✅ HubSpot OK':'❌ HubSpot error:',res.status);})
    .catch(function(err){console.error('❌ HubSpot error:',err);});
}

function renderError(){
  document.getElementById('app').innerHTML='<div class="error-state">'
    +'<div class="error-title">Results not found</div>'
    +'<div class="error-body">This link may be incomplete or expired. Please <a href="/general/assessment.html" style="color:var(--teal)">take the assessment</a> to generate your results, or check your email for your personalized results link.</div>'
    +'</div>';
}

(function(){
  var d=getParams();
  if(!d.tier||!d.score){
    // Demo mode for previewing — swap for renderError() when live
    render({score:69,tier:'Emerging',bf:75,dt:67,oa:67,cg:67,air:67,opp:'Data & Technology',q18:'Cost or budget uncertainty',q19:'Saving time on admin and repetitive tasks'}, true);
    return;
  }
  render(d, true); // true = skip gate, show everything
})();

(function(){
  var btn=document.getElementById('nav-hamburger');var drawer=document.getElementById('nav-drawer');
  if(!btn||!drawer)return;
  btn.addEventListener('click',function(e){e.stopPropagation();btn.classList.toggle('open');drawer.classList.toggle('open');});
  document.addEventListener('click',function(e){if(drawer.classList.contains('open')&&!drawer.contains(e.target)&&e.target!==btn){btn.classList.remove('open');drawer.classList.remove('open');}});
})();
</script>
